name: Deploy to S3

on:
  push:
    branches: [ main ]

jobs:
  deploy-portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build portfolio
        run: npm run build:static

      - name: Deploy portfolio to S3
        run: |
          aws s3 sync out/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --delete \
            --exclude "channel-stream/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  deploy-channel-stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Channel Stream dependencies
        working-directory: Channel_Stream
        run: npm ci

      - name: Build Channel Stream
        working-directory: Channel_Stream
        env:
          NEXT_PUBLIC_API_URL: https://api.jonathanlohr.com
          NEXT_PUBLIC_COGNITO_DOMAIN: https://channel-stream-jl.auth.us-east-1.amazoncognito.com
          NEXT_PUBLIC_COGNITO_CLIENT_ID: 1bsck4p8ma568p0pj8rk4gkug9
          NEXT_PUBLIC_REDIRECT_URI: https://jonathanlohr.com/channel-stream/auth/callback
          NEXT_PUBLIC_BASE_PATH: /channel-stream
        run: npm run build

      - name: Deploy Channel Stream to S3
        run: |
          aws s3 sync Channel_Stream/out/ s3://${{ secrets.AWS_S3_BUCKET }}/channel-stream/ --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Amazon ECR and push image
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          REPOSITORY:            channel-stream-backend
          SHA_TAG:               ${{ github.sha }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "${AWS_REGION}" | \
            docker login --username AWS --password-stdin "${REGISTRY}"
          docker build \
            -t "${REGISTRY}/${REPOSITORY}:${SHA_TAG}" \
            -t "${REGISTRY}/${REPOSITORY}:latest" \
            Channel_Stream/
          docker push "${REGISTRY}/${REPOSITORY}:${SHA_TAG}"
          docker push "${REGISTRY}/${REPOSITORY}:latest"

      - name: Force ECS service redeploy
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
        run: |
          aws ecs update-service \
            --cluster channel-stream \
            --service channel-stream-backend \
            --force-new-deployment \
            --query 'service.deployments[0].status' \
            --output text
